workers: 4

jobs:
  - name: build
    command: "python3 -m py_compile mock_python_app/app.py"
    depends_on: []

  - name: test
    command: "python3 -m unittest mock_python_app/test_app.py"
    depends_on: [build]

  - name: deploy
    command: "docker rm -f mock-python-container || true && docker build -t mock-python-app ./mock_python_app && docker run -d --name mock-python-container -p 8081:8081 mock-python-app"
    depends_on: [test]
