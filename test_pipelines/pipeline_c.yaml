workers: 4

jobs:
  - name: build
    command: "gcc -O2 -Wall -o mock_c_app/server mock_c_app/main.c && gcc -o mock_c_app/tester mock_c_app/test_app.c"
    depends_on: []

  - name: test
    command: "./mock_c_app/tester"
    depends_on: [build]

  - name: deploy
    command: "docker rm -f mock-c-container || true && docker build -t mock-c-app ./mock_c_app && docker run -d --name mock-c-container -p 8080:8080 mock-c-app"
    depends_on: [test]
