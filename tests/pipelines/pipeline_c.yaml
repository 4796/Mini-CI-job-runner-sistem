workers: 4

jobs:
  - name: build
    command: "gcc -O2 -Wall -o tests/mock_apps/c/server tests/mock_apps/c/main.c && gcc -o tests/mock_apps/c/tester tests/mock_apps/c/test_app.c"
    depends_on: []

  - name: test
    command: "./tests/mock_apps/c/tester"
    depends_on: [build]

  - name: deploy
    command: "docker rm -f mock-c-container || true && docker build -t mock-c-app ./tests/mock_apps/c && docker run -d --name mock-c-container -p 8080:8080 mock-c-app"
    depends_on: [test]
